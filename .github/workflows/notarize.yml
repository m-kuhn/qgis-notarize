name: Notarize and Release DMG

on:
  push:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      release:
        description: Release tag to notarize (e.g. final-3_42_0)
        required: true
        type: string
  repository_dispatch:
    types: [notarize_dmg]


jobs:
  notarize:
    runs-on: macos-latest
    env:
      KEYCHAIN_NAME: notary-keychain
      KEYCHAIN_PASSWORD: dummy
    
    strategy:
      matrix:
        include:
          - branch: master
    

    steps:
      - name: 🐣 Checkout code
        uses: actions/checkout@v4

      - name: 🌾 Set up GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: 🏮 Get latest successful run ID
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          run_id=$(gh run list --repo "qgis/QGIS" \
                    --workflow "build-macos-qt6.yml" \
                    --branch ${{ matrix.branch }} \
                    --limit 10 \
                    --json databaseId,status,conclusion | \
                    jq '[.[] | select(.status == "completed" and .conclusion == "success")] | sort_by(.databaseId) | reverse | .[0].databaseId')
          echo "Found run_id=$run_id"
          echo "RUN_ID=$run_id" >> $GITHUB_ENV

      - name: 🎋 List artifacts from that run
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          artifact_name=$(gh api repos/qgis/QGIS/actions/runs/${RUN_ID}/artifacts \
            --jq '.artifacts[] | select(.name | test("^qgis-.*-dmg$")) | .name' | head -n 1)

          if [ -z "$artifact_name" ]; then
            echo "❌ No matching artifact found for pattern qgis-*-dmg"
            exit 1
          fi

          echo "Found artifact: $artifact_name"
          echo "ARTIFACT_NAME=$artifact_name" >> $GITHUB_ENV

      - name: 📥 Download artifact from qgis/QGIS
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          gh run download ${RUN_ID} \
            --repo qgis/QGIS \
            --name ${ARTIFACT_NAME} \
            --dir ./downloaded-artifacts

      - name: 📥 Download artifact from release (repository_dispatch)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'repository_dispatch' && github.event.action == 'notarize_dmg')
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.release }}"
          else
            RELEASE_TAG="${{ github.event.client_payload.release_tag }}"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "❌ release tag is required"
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

          URL="https://github.com/m-kuhn/QGIS/releases/download/${RELEASE_TAG}/QGIS-Installer.dmg"

          echo "Downloading DMG from $URL"
          mkdir -p downloaded-artifacts
          curl -fL "$URL" -o downloaded-artifacts/QGIS-Installer.dmg

          # expose a predictable name for downstream steps
          echo "ARTIFACT_NAME=QGIS-Installer.dmg" >> $GITHUB_ENV

          SPLASH_URL="https://raw.githubusercontent.com/m-kuhn/QGIS/refs/tags/${RELEASE_TAG}/images/splash/splash.png"

          echo "Downloading splash screen from $SPLASH_URL"
          curl -fL "$SPLASH_URL" -o downloaded-artifacts/splash.png
            
      - name: 🔑 Import signing certificate
        run: |
          echo "${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}" | base64 --decode > cert.p12
          P12_PATH=cert.p12
          P12_PASSWORD=${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$P12_PATH" -k "$KEYCHAIN_NAME" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 -l "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          # Print expiration date and other certificate metadata
          security find-certificate -a -p "$KEYCHAIN_NAME" | openssl x509 -noout -subject -issuer -dates

      - name: 🐎 Mount the DMG
        id: mount
        run: |
          MOUNT_OUTPUT=$(hdiutil attach ./downloaded-artifacts/*.dmg)
          echo "$MOUNT_OUTPUT"
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | grep -oE '/Volumes/.*' | head -n 1)
          echo "MOUNT_POINT=$MOUNT_POINT"
          cp -R "$MOUNT_POINT"/*.app .
          echo "MOUNT_POINT=$MOUNT_POINT" >> "$GITHUB_ENV"

      - name: 🖋️ Clean and sign app
        run: |
          set -euo pipefail

          APP_PATH=$(echo ./*.app)

          echo "::group::Clean bundle"
          find "$APP_PATH" -type f \( -name "*.o" -o -name "*.a" -o -name "*.prl" -o -name "*.la" -o -name "*.pyc" \) -delete
          rm -f "$APP_PATH/Contents/PlugIns/qtdeploy.ps1"
          echo "::endgroup::"

          echo "::group::Sign nested app/framework/plugin bundles first"
          find "$APP_PATH/Contents" \( \
            -name "*.app" -o \
            -name "*.framework" -o \
            -name "*.xpc" -o \
            -name "*.appex" -o \
            -name "*.bundle" -o \
            -name "*.plugin" \) -print0 |
          while IFS= read -r -d '' item; do
            [ "$item" = "$APP_PATH" ] && continue
            echo "Signing bundle: $item"
            codesign --force \
              --sign "Developer ID Application" \
              --options runtime \
              --timestamp \
              --keychain "$KEYCHAIN_NAME" \
              "$item"
          done
          echo "::endgroup::"

          echo "::group::Sign dylibs"
          find "$APP_PATH/Contents" -type f -name "*.dylib" -print0 |
          while IFS= read -r -d '' file; do
            echo "Signing dylib: $file"
            codesign --force \
              --sign "Developer ID Application" \
              --timestamp \
              --keychain "$KEYCHAIN_NAME" \
              "$file"
          done
          echo "::endgroup::"

          echo "::group::Sign Mach-O executables"
          find "$APP_PATH/Contents/MacOS" -type f -print0 |
          while IFS= read -r -d '' file; do
            echo "Signing MacOS payload: $file"
            codesign --force \
              --sign "Developer ID Application" \
              --timestamp \
              --keychain "$KEYCHAIN_NAME" \
              "$file"
          done
          echo "::endgroup::"

          echo "::group::Verify critical CLI tools"
          for tool in \
            "$APP_PATH/Contents/MacOS/qgis_process" \
            "$APP_PATH/Contents/MacOS/gdal_translate"
          do
            if [ -f "$tool" ]; then
              echo "Verifying $tool"
              codesign --verify --strict --verbose=4 "$tool"
            fi
          done
          echo "::endgroup::"

          echo "::group::Sign top-level app"
          codesign --force \
            --sign "Developer ID Application" \
            --options runtime \
            --entitlements entitlements.plist \
            --timestamp \
            --keychain "$KEYCHAIN_NAME" \
            "$APP_PATH"
          echo "::endgroup::"

          echo "::group::Verify app"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          echo "::endgroup::"

      - name: 🔧 Recreate DMG (clean signed app)
        run: |
          APP_PATH=$(echo *.app)
          QGIS_APP_NAME="${APP_PATH%.*}"

          brew install create-dmg
          create-dmg --volname "QGIS Installer" \
            --hide-extension "${QGIS_APP_NAME}.app" \
            --background "$MOUNT_POINT/.background/installer_background.png" \
            --volicon "$MOUNT_POINT/.VolumeIcon.icns" \
            --window-pos 200 120 \
            --window-size 512 320 \
            --icon-size 100 \
            --icon "${QGIS_APP_NAME}.app" 130 160 \
            --app-drop-link 400 155 \
            "${QGIS_APP_NAME}.dmg" \
            "$APP_PATH"

          codesign --sign "Developer ID Application" --timestamp --keychain "$KEYCHAIN_NAME" "${QGIS_APP_NAME}.dmg"

          echo "QGIS_APP_NAME=$QGIS_APP_NAME" >> "$GITHUB_ENV"

      - name: 🔏 Notarize the new DMG
        run: |
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > authkey.p8

          echo "📝 Submitting ${QGIS_APP_NAME}.dmg to Apple Notary Service..."
          submission_output=$(mktemp)
          xcrun notarytool submit ${QGIS_APP_NAME}.dmg \
            --key authkey.p8 \
            --key-id "${{ secrets.API_KEY_ID }}" \
            --issuer "${{ secrets.API_KEY_ISSUER_ID }}" \
            --wait | tee "$submission_output"

          NOTARIZATION_ID=$(grep -m1 '^  id:' "$submission_output" | awk '{print $2}')

          if [ -z "$NOTARIZATION_ID" ]; then
            echo "❌ Failed to extract Notarization ID."
            cat "$submission_output"
            exit 1
          fi

          echo "📦 Notarization Submission ID: $NOTARIZATION_ID"
          echo "NOTARIZATION_ID=$NOTARIZATION_ID" >> "$GITHUB_ENV"

      - name: 📄 Show notarization log
        if: always() && env.NOTARIZATION_ID != ''
        run: |
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > authkey.p8

          xcrun notarytool log "$NOTARIZATION_ID" \
            --key authkey.p8 \
            --key-id "${{ secrets.API_KEY_ID }}" \
            --issuer "${{ secrets.API_KEY_ISSUER_ID }}"

      - name: 🥓 Staple the DMG
        run: |
          xcrun stapler staple ${QGIS_APP_NAME}.dmg

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QGIS-${{ matrix.branch }}
          path: "*.dmg"

      - name: 📦 Upload notarized DMG to source release (m-kuhn/QGIS)
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'repository_dispatch' && github.event.action == 'notarize_dmg')
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "❌ RELEASE_TAG not provided"
            exit 1
          fi

          FILE=$(ls *.dmg | head -n 1)
          if [ -z "$FILE" ]; then
            echo "❌ No dmg found to upload"
            exit 1
          fi

          # Authenticate gh CLI with a PAT that can write to the main repository
          echo "${{ secrets.PAT }}" | gh auth login --with-token

          echo "Uploading $FILE to release $RELEASE_TAG on m-kuhn/QGIS (clobber existing asset)"
          gh release upload "$RELEASE_TAG" "$FILE" --repo m-kuhn/QGIS --clobber

      - name: 📦 Upload notarized DMG to the QGIS download page
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'repository_dispatch' && github.event.action == 'notarize_dmg')
        env:
          RELEASE: ltr
          ROOT: s3://qgis-download/macos
        run: |
          brew install s3cmd
          echo "${{ secrets.S3CFG }}" > ~/.s3cfg

          DMG=$(ls *.dmg | head -n 1)
          sha256sum $DMG > $DMG.sha256sum

          process_file () {
              LOCAL=$1
              EXTENSION=$2

              s3cmd put $LOCAL $ROOT/$RELEASE/qgis_${RELEASE}_${RELEASE_TAG}.$EXTENSION
              s3cmd put $LOCAL $ROOT/qgis-macos-$RELEASE.$EXTENSION
          }

          echo "Upload $RELEASE_TAG"

          # upload files
          if [ -f $DMG ]; then
              process_file $DMG dmg
              process_file $DMG.sha256sum sha256sum
              process_file downloaded-artifacts/splash.png png
          fi
